apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  homelab-overview.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Node CPU Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          },
          "targets": [
            {
              "expr": "100 - (avg(irate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU"
            }
          ]
        },
        {
          "title": "Node Memory Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory"
            }
          ]
        },
        {
          "title": "Disk Usage",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          },
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"rootfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"rootfs\"}) * 100)",
              "legendFormat": "Disk"
            }
          ]
        },
        {
          "title": "Uptime",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "dtdurations"
            }
          },
          "targets": [
            {
              "expr": "time() - node_boot_time_seconds",
              "legendFormat": "Uptime"
            }
          ]
        },
        {
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "title": "Pods Not Ready",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "noValue": "0"
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=~\"Pending|Failed|Unknown\"}) or vector(0)",
              "legendFormat": "Not Ready"
            }
          ]
        },
        {
          "title": "CPU Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "100 - (avg(irate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %"
            }
          ]
        },
        {
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "min": 0,
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "Used"
            },
            {
              "expr": "node_memory_MemTotal_bytes",
              "legendFormat": "Total"
            }
          ]
        },
        {
          "title": "Network Traffic",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "irate(node_network_receive_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "Receive {{ "{{" }}device{{ "}}" }}"
            },
            {
              "expr": "-irate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "Transmit {{ "{{" }}device{{ "}}" }}"
            }
          ]
        },
        {
          "title": "Disk I/O",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "irate(node_disk_read_bytes_total{device!~\"dm-.*\"}[5m])",
              "legendFormat": "Read {{ "{{" }}device{{ "}}" }}"
            },
            {
              "expr": "-irate(node_disk_written_bytes_total{device!~\"dm-.*\"}[5m])",
              "legendFormat": "Write {{ "{{" }}device{{ "}}" }}"
            }
          ]
        },
        {
          "title": "Pod Restarts (last 1h)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "custom": {
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Restarts" }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total[1h]) > 0",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "service": true,
                  "uid": true
                },
                "renameByName": {
                  "container": "Container",
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "Value": "Restarts"
                }
              }
            }
          ]
        },
        {
          "title": "PVC Usage",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Used %" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 70 },
                        { "color": "red", "value": 85 }
                      ]
                    }
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } },
                  { "id": "unit", "value": "percent" }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "100 - (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes * 100)",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "metrics_path": true,
                  "node": true,
                  "service": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "persistentvolumeclaim": "PVC",
                  "Value": "Used %"
                }
              }
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["homelab"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "Homelab Overview",
      "uid": "homelab-overview"
    }
