image:
  repository: louislam/uptime-kuma
  tag: "1"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: true
  host: uptime-kuma.homelab.internal

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""  # uses default (local-path on k3s)

resources:
  limits:
    memory: 256Mi
  requests:
    memory: 128Mi
    cpu: 50m
