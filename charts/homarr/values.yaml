image:
  repository: ghcr.io/homarr-labs/homarr
  tag: "v1.5.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 7575

ingress:
  enabled: true
  host: homelab.internal

persistence:
  enabled: true
  size: 1Gi

resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi
    cpu: 50m

env:
  DB_URL: "file:/appdata/db/db.sqlite"
  DB_DRIVER: "better-sqlite3"
  AUTH_PROVIDERS: "credentials"
  AUTH_SESSION_EXPIRY_TIME: "30d"
