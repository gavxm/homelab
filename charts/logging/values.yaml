# ---------- Loki ----------
loki:
  # Single-node mode (no distributed components)
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: 168h  # 7 days

    commonConfig:
      replication_factor: 1

    storage:
      type: filesystem

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

  # Single binary mode
  singleBinary:
    replicas: 1
    persistence:
      size: 5Gi
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 50m

  # Disable components not needed in single-node
  gateway:
    enabled: false
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # Disable chunksCache, resultsCache (not needed for single-node)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

# ---------- Promtail ----------
promtail:
  config:
    clients:
      - url: http://logging-loki:3100/loki/api/v1/push

  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 10m
