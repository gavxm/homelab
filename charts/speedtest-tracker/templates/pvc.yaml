apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "speedtest-tracker.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "speedtest-tracker.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
