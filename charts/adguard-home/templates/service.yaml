apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard-home.fullname" . }}-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adguard-home.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      nodePort: {{ .Values.dns.nodePort }}
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      nodePort: {{ .Values.dns.nodePort }}
      protocol: UDP
  selector:
    {{- include "adguard-home.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard-home.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adguard-home.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    {{- include "adguard-home.selectorLabels" . | nindent 4 }}
