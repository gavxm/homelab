---
# Patch ArgoCD repo-server to support helm-secrets with SOPS + age
#
# Apply order:
#   1. kubectl -n argocd create secret generic argocd-age-key \
#        --from-file=keys.txt=$HOME/.config/sops/age/keys.txt
#   2. kubectl apply -f bootstrap/argocd-helm-secrets.yaml
#   3. kubectl -n argocd rollout restart deployment argocd-repo-server
#
# Note: This is a strategic merge patch - apply with:
#   kubectl patch deployment argocd-repo-server -n argocd --patch-file bootstrap/argocd-helm-secrets.yaml
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      volumes:
        - name: sops-age
          secret:
            secretName: argocd-age-key
        - name: helm-plugins
          emptyDir: {}
        - name: sops-bin
          emptyDir: {}
      initContainers:
        - name: install-helm-secrets
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl bash git

              # Install sops
              curl -fsSL -o /sops-bin/sops \
                https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
              chmod +x /sops-bin/sops

              # Install age
              curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz \
                | tar xz -C /tmp
              cp /tmp/age/age /sops-bin/age
              chmod +x /sops-bin/age

              # Install helm-secrets plugin
              export HELM_PLUGINS=/helm-plugins
              export PATH="/sops-bin:$PATH"
              helm plugin install https://github.com/jkroepke/helm-secrets --version v4.6.2
          volumeMounts:
            - name: sops-bin
              mountPath: /sops-bin
            - name: helm-plugins
              mountPath: /helm-plugins
      containers:
        - name: argocd-repo-server
          env:
            - name: HELM_PLUGINS
              value: /helm-plugins
            - name: SOPS_AGE_KEY_FILE
              value: /sops-age/keys.txt
          volumeMounts:
            - name: sops-age
              mountPath: /sops-age
              readOnly: true
            - name: helm-plugins
              mountPath: /helm-plugins
            - name: sops-bin
              mountPath: /usr/local/sbin/sops
              subPath: sops
            - name: sops-bin
              mountPath: /usr/local/sbin/age
              subPath: age
---
# Allow secrets:// protocol in helm valueFiles
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  helm.valuesFileSchemes: secrets, https, http
