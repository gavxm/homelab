---
# Set ArgoCD to insecure mode (no internal TLS)
# so Traefik can proxy plain HTTP
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"
---
# Expose ArgoCD UI via Traefik
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    # ArgoCD uses gRPC + HTTP on same port; Traefik needs h2c for this
    traefik.ingress.kubernetes.io/router.tls: "false"
    ingress.kubernetes.io/protocol: h2c
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.homelab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
